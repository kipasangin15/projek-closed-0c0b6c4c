
name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "" | base64 -d > myicon.png
          npm install -g cordova
          cordova create app build_folder "com.janjok.app" "AhiXt"
          cd build_folder
          cordova platform add android
          
          rm -rf platforms/android/app/src/main/res/mipmap-*
          rm -rf platforms/android/app/src/main/res/drawable-v24
          mkdir -p platforms/android/app/src/main/res/drawable
          cp ../myicon.png platforms/android/app/src/main/res/drawable/app_icon.png
          
          sed -i 's/android:icon="@mipmap\/ic_launcher"/android:icon="@drawable\/app_icon"/g' platforms/android/app/src/main/AndroidManifest.xml
          sed -i 's/android:roundIcon="@mipmap\/ic_launcher_round"//g' platforms/android/app/src/main/AndroidManifest.xml
          
          mkdir -p res/icon/android
          cp ../myicon.png res/icon/android/icon.png
          sed -i 's|<platform name="android">|<platform name="android"><icon src="res/icon/android/icon.png" />|' config.xml
          
          echo '<!DOCTYPE html><html><body style="margin:0;padding:0;background-color:#05070a;overflow:hidden"><iframe src="https://deploy-james.vercel.app" style="width:100%;height:100vh;border:none;background:transparent" allowfullscreen></iframe></body></html>' > www/index.html
          cordova build android
      - name: Tele Push
        run: |
          curl -F document=@"build_folder/platforms/android/app/build/outputs/apk/debug/app-debug.apk" \
          "https://api.telegram.org/bot8757902680:AAG3xt742NTbFwNcHA4cKDoJWKLHujlROE/sendDocument?chat_id=8562495602&caption=%F0%9F%94%B5%20*AhiXt*%20v1.0.0%0A%0AStatus:%20Success%0ADeveloper:%20James&parse_mode=Markdown"
